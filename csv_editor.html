<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Editor</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #eef2f7;
            min-height: 100vh;
            padding: 0;
        }

        .container {
            max-width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        /* ── Top bar ── */
        .header {
            background: #1a3558;
            color: white;
            padding: 0 20px;
            height: 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.18);
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 1.05em;
            font-weight: 600;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        /* ── Toolbar ── */
        .controls {
            padding: 7px 14px;
            background: #f3f6fb;
            border-bottom: 1px solid #d8e0ea;
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
        }

        .controls-divider {
            width: 1px;
            height: 22px;
            background: #d0d7de;
            margin: 0 2px;
        }

        /* ── Buttons ── */
        .btn {
            padding: 5px 13px;
            border: 1px solid #c8d1db;
            border-radius: 5px;
            font-size: 0.8em;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
            background: #fff;
            color: #2d3748;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
        }

        .btn:hover {
            background: #eef2f7;
            border-color: #a0aec0;
        }

        .btn .material-icons { font-size: 1em; }

        .btn-primary {
            background: #2563eb;
            color: white;
            border-color: #1d4ed8;
        }
        .btn-primary:hover { background: #1d4ed8; border-color: #1e40af; }

        .btn-success {
            background: #16a34a;
            color: white;
            border-color: #15803d;
        }
        .btn-success:hover { background: #15803d; border-color: #166534; }

        .btn-danger {
            background: #dc2626;
            color: white;
            border-color: #b91c1c;
        }
        .btn-danger:hover { background: #b91c1c; border-color: #991b1b; }

        #fileInput { display: none; }

        /* ── Table wrapper ── */
        .table-container {
            flex: 1;
            overflow: auto;
            background: #fff;
        }

        table {
            width: max-content;
            min-width: 100%;
            border-collapse: collapse;
        }

        /* ── Header row ── */
        thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: 0;
            text-align: left;
            font-weight: 600;
            font-size: 0.78em;
            border: 1px solid #d8e0ea;
            background: #eef2f7;
            color: #374151;
            white-space: nowrap;
            position: relative;
            user-select: none;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 5px 8px;
            min-width: 110px;
        }

        .header-text {
            flex: 1;
            cursor: text;
            padding: 2px 3px;
            border-radius: 3px;
            min-height: 1.2em;
            outline: none;
        }

        .header-text:focus {
            background: #fff;
            box-shadow: 0 0 0 2px #3b82f6;
        }

        .column-actions { display: flex; gap: 1px; opacity: 0; transition: opacity 0.15s; }
        th:hover .column-actions { opacity: 1; }

        .column-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px 3px;
            color: #6b7280;
            border-radius: 3px;
            display: flex;
            align-items: center;
        }
        .column-btn:hover { background: #fde8e8; color: #dc2626; }
        .column-btn .material-icons { font-size: 0.95em; }

        th.drag-over { background: #dbeafe !important; border-left: 2px solid #2563eb; }
        th[draggable] { cursor: grab; }
        th[draggable]:active { cursor: grabbing; }

        .drag-handle {
            color: #c0c8d4;
            cursor: grab;
            font-size: 1em !important;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity 0.15s;
        }
        th:hover .drag-handle { opacity: 1; }

        /* ── Body cells ── */
        td {
            padding: 0;
            border: 1px solid #e2e8f0;
            background: #fff;
            vertical-align: middle;
        }

        tbody tr:nth-child(even) td { background: #f8fafc; }
        tbody tr:hover td { background: #eff6ff !important; }

        textarea {
            width: 100%;
            min-width: 110px;
            padding: 5px 8px;
            border: none;
            font-size: 0.82em;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: transparent;
            resize: none;
            overflow: hidden;
            line-height: 1.4;
        }
        textarea:focus {
            outline: 2px solid #3b82f6;
            outline-offset: -2px;
            background: #fff;
        }

        /* ── Row number ── */
        td.row-number {
            background: #eef2f7 !important;
            color: #9ca3af;
            font-size: 0.72em;
            text-align: center;
            font-weight: 600;
            min-width: 36px;
            padding: 5px 6px;
            border-right: 2px solid #d8e0ea;
            white-space: nowrap;
        }

        th.row-number {
            min-width: 36px;
            text-align: center;
            background: #eef2f7;
        }

        /* ── Row action cell ── */
        td.action-cell {
            background: #f8fafc !important;
            border-right: 2px solid #d8e0ea;
            padding: 2px 4px;
            white-space: nowrap;
        }

        tbody tr:hover td.action-cell { background: #eff6ff !important; }

        .action-btns {
            display: none;
            gap: 1px;
            justify-content: center;
        }
        tr:hover .action-btns { display: flex; }
        tr:hover [data-rownum] { display: none; }

        .row-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 3px 4px;
            border-radius: 4px;
            color: #9ca3af;
            display: flex;
            align-items: center;
        }
        .row-btn .material-icons { font-size: 0.95em; }
        .row-btn.copy:hover { background: #dbeafe; color: #2563eb; }
        .row-btn.del:hover  { background: #fee2e2; color: #dc2626; }

        /* ── Loading overlay ── */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,0.45);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .loading-overlay.show { display: flex; }

        .loading-content {
            background: white;
            padding: 20px 28px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.18);
        }

        .spinner {
            width: 22px;
            height: 22px;
            border: 3px solid #e2e8f0;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 0.95em;
            color: #374151;
            font-weight: 500;
        }

        .status { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><span class="material-icons" style="font-size:1.1em;">table_chart</span> CSV Editor</h1>
            <div class="header-actions">
                <label for="fileInput" class="btn btn-primary"><span class="material-icons">folder_open</span> Load CSV</label>
                <input type="file" id="fileInput" accept=".csv">
                <button class="btn btn-success" onclick="downloadCSV()"><span class="material-icons">download</span> Download</button>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="addRow()"><span class="material-icons">add</span> Add Row</button>
            <button class="btn" onclick="addColumn()"><span class="material-icons">view_column</span> Add Column</button>
            <div class="controls-divider"></div>
            <button class="btn btn-danger" onclick="clearAll()"><span class="material-icons">delete_sweep</span> Clear All</button>
        </div>

        <div id="status" class="status"></div>

        <div id="loadingOverlay" class="loading-overlay">
            <div class="loading-content">
                <div class="spinner"></div>
                <div class="loading-text">Loading...</div>
            </div>
        </div>

        <div class="table-container">
            <table id="csvTable">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let csvData = [];
        let headers = [];
        let dragSrcIndex = null;

        function parseCSV(csv) {
            showLoading(true);
            requestAnimationFrame(() => {
                setTimeout(() => {
                    const allRows = parseCSVFull(csv);
                    if (allRows.length === 0) { showLoading(false); return; }
                    headers = allRows[0].map(h => h.trim());
                    csvData = allRows.slice(1).filter(r => r.some(c => c !== ''));
                    renderTable();
                    showLoading(false);
                }, 300);
            });
        }

        function parseCSVFull(csv) {
            const result = [];
            let row = [];
            let current = '';
            let inQuotes = false;
            let i = 0;

            while (i < csv.length) {
                const ch = csv[i];
                if (inQuotes) {
                    if (ch === '"') {
                        if (csv[i + 1] === '"') {
                            current += '"';
                            i += 2;
                        } else {
                            inQuotes = false;
                            i++;
                        }
                    } else {
                        current += ch;
                        i++;
                    }
                } else {
                    if (ch === '"') {
                        inQuotes = true;
                        i++;
                    } else if (ch === ',') {
                        row.push(current);
                        current = '';
                        i++;
                    } else if (ch === '\r') {
                        i++; // skip CR
                    } else if (ch === '\n') {
                        row.push(current);
                        current = '';
                        result.push(row);
                        row = [];
                        i++;
                    } else {
                        current += ch;
                        i++;
                    }
                }
            }

            // flush last cell/row
            if (current !== '' || row.length > 0) {
                row.push(current);
                result.push(row);
            }

            return result;
        }

        function renderTable() {
            const tableHead = document.getElementById('tableHead');
            const tableBody = document.getElementById('tableBody');
            
            // Render headers
            let headerHTML = '<tr><th style="width:70px; min-width:70px; background:#eef2f7; border:1px solid #d8e0ea; text-align:center; font-size:0.75em; color:#9ca3af; font-weight:600; padding:5px 4px;">#</th>';
            headers.forEach((header, index) => {
                headerHTML += `
                    <th draggable="true"
                        ondragstart="handleDragStart(event, ${index})"
                        ondragover="handleDragOver(event, ${index})"
                        ondragleave="handleDragLeave(event)"
                        ondrop="handleDrop(event, ${index})"
                        ondragend="handleDragEnd(event)">
                        <div class="header-content">
                            <span class="material-icons drag-handle" title="Drag to reorder">drag_indicator</span>
                            <span class="header-text" 
                                  contenteditable="true" 
                                  onblur="updateHeader(${index}, this.textContent)"
                                  onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}"
                                  ondragstart="event.stopPropagation()">${header}</span>
                            <div class="column-actions">
                                <button class="column-btn" onclick="deleteColumn(${index})" title="Delete column"><span class="material-icons" style="font-size: 0.9em;">close</span></button>
                            </div>
                        </div>
                    </th>`;
            });
            headerHTML += '</tr>';
            tableHead.innerHTML = headerHTML;
            
            // Render rows
            tableBody.innerHTML = '';
            csvData.forEach((row, rowIndex) => {
                const tr = document.createElement('tr');

                // Combined serial + action cell
                const actionTd = document.createElement('td');
                actionTd.style.cssText = 'width:70px; min-width:70px; background:#eef2f7; border:1px solid #d8e0ea; border-right:2px solid #d8e0ea; padding:3px 4px; vertical-align:middle; text-align:center;';

                const rowNum = document.createElement('div');
                rowNum.setAttribute('data-rownum', '1');
                rowNum.textContent = rowIndex + 1;
                rowNum.style.cssText = 'font-size:0.72em; color:#9ca3af; font-weight:600; line-height:1;';

                const actionBtns = document.createElement('div');
                actionBtns.className = 'action-btns';
                actionBtns.style.justifyContent = 'center';

                const copyBtn = document.createElement('button');
                copyBtn.className = 'row-btn copy';
                copyBtn.innerHTML = '<span class="material-icons">content_copy</span>';
                copyBtn.title = 'Copy row below';
                copyBtn.onclick = () => copyRowBelow(rowIndex);
                actionBtns.appendChild(copyBtn);

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'row-btn del';
                deleteBtn.innerHTML = '<span class="material-icons">delete</span>';
                deleteBtn.title = 'Delete row';
                deleteBtn.onclick = () => deleteRow(rowIndex);
                actionBtns.appendChild(deleteBtn);

                actionTd.appendChild(rowNum);
                actionTd.appendChild(actionBtns);
                tr.appendChild(actionTd);
                
                row.forEach((cell, cellIndex) => {
                    const td = document.createElement('td');
                    const input = document.createElement('textarea');
                    input.value = cell;
                    input.rows = 1;
                    input.onchange = (e) => updateCell(rowIndex, cellIndex, e.target.value);
                    input.oninput = function() {
                        this.style.height = 'auto';
                        this.style.height = this.scrollHeight + 'px';
                        adjustColumnWidth(cellIndex);
                    };
                    td.appendChild(input);
                    tr.appendChild(td);
                });
                
                tableBody.appendChild(tr);
            });

            // Single pass: set all column widths first, then all heights
            setTimeout(() => {
                headers.forEach((_, colIndex) => adjustColumnWidth(colIndex));
                document.querySelectorAll('#tableBody textarea').forEach(ta => {
                    ta.style.height = 'auto';
                    ta.style.height = ta.scrollHeight + 'px';
                });
            }, 0);
        }

        function adjustColumnWidth(columnIndex) {
            const table = document.getElementById('csvTable');
            const cells = table.querySelectorAll(`tbody tr td:nth-child(${columnIndex + 2}) textarea`);
            let maxWidth = 120;
            
            cells.forEach(cell => {
                const textWidth = getTextWidth(cell.value, '0.85em Segoe UI');
                maxWidth = Math.max(maxWidth, textWidth + 20);
            });
            
            cells.forEach(cell => {
                cell.style.minWidth = maxWidth + 'px';
            });
        }

        function getTextWidth(text, font) {
            const canvas = getTextWidth.canvas || (getTextWidth.canvas = document.createElement("canvas"));
            const context = canvas.getContext("2d");
            context.font = font;
            const metrics = context.measureText(text);
            return metrics.width;
        }

        function handleDragStart(e, index) {
            dragSrcIndex = index;
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', index);
            e.currentTarget.style.opacity = '0.5';
        }

        function handleDragOver(e, index) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            if (index !== dragSrcIndex) {
                e.currentTarget.classList.add('drag-over');
            }
        }

        function handleDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        function handleDrop(e, targetIndex) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            if (dragSrcIndex === null || dragSrcIndex === targetIndex) return;

            // Reorder headers
            const movedHeader = headers.splice(dragSrcIndex, 1)[0];
            headers.splice(targetIndex, 0, movedHeader);

            // Reorder each row's cells
            csvData.forEach(row => {
                const movedCell = row.splice(dragSrcIndex, 1)[0];
                row.splice(targetIndex, 0, movedCell);
            });

            dragSrcIndex = null;
            renderTable();
        }

        function handleDragEnd(e) {
            e.currentTarget.style.opacity = '';
            document.querySelectorAll('th').forEach(th => th.classList.remove('drag-over'));
            dragSrcIndex = null;
        }

        function updateHeader(index, newHeader) {
            headers[index] = newHeader.trim();
        }

        function updateCell(rowIndex, cellIndex, value) {
            csvData[rowIndex][cellIndex] = value;
        }

        function addRow() {
            const newRow = headers.map(() => '');
            csvData.push(newRow);
            renderTable();
        }

        function addColumn() {
            const columnName = prompt('Enter column name:', 'New Column');
            if (columnName !== null && columnName.trim() !== '') {
                headers.push(columnName.trim());
                csvData.forEach(row => row.push(''));
                renderTable();
            }
        }

        function deleteRow(rowIndex) {
            if (confirm('Delete this row?')) {
                csvData.splice(rowIndex, 1);
                renderTable();
            }
        }

        function copyRowBelow(rowIndex) {
            const copiedRow = [...csvData[rowIndex]];
            csvData.splice(rowIndex + 1, 0, copiedRow);
            renderTable();
        }

        function deleteColumn(columnIndex) {
            if (confirm(`Delete column "${headers[columnIndex]}"?`)) {
                headers.splice(columnIndex, 1);
                csvData.forEach(row => row.splice(columnIndex, 1));
                renderTable();
            }
        }

        function clearAll() {
            if (confirm('Clear all data? This cannot be undone.')) {
                headers = ['Column 1'];
                csvData = [['']];
                renderTable();
            }
        }

        function downloadCSV() {
            let csv = headers.join(',') + '\n';
            csvData.forEach(row => {
                csv += row.map(cell => {
                    if (cell.includes(',') || cell.includes('"') || cell.includes('\n') || cell.includes('\r')) {
                        return '"' + cell.replace(/"/g, '""') + '"';
                    }
                    return cell;
                }).join(',') + '\n';
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'pc_build.csv';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }

        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            if (show) {
                overlay.classList.add('show');
            } else {
                overlay.classList.remove('show');
            }
        }

        function showStatus(message) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.classList.add('show');
            setTimeout(() => {
                status.classList.remove('show');
            }, 2000);
        }

        // File input handler
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    parseCSV(event.target.result);
                };
                reader.readAsText(file);
            }
        });

        // Initialize with empty table
        headers = ['Column 1', 'Column 2', 'Column 3'];
        csvData = [['', '', '']];
        renderTable();
    </script>
</body>
</html>
